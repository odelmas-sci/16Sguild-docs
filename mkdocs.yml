site_name: 16Sguild
site_description: Guild-based 16S-rRNA sequencing analysis pipeline

docs_dir: docs

theme:
  name: material
  logo: assets/16Sguild.png
  favicon: assets/16Sguild_favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Basic Workflow: basic-workflow.md
  - Parameters: parameters.md
  - Output: output.md
  - Change Log: changelog.md
  - FAQ: faq.md
